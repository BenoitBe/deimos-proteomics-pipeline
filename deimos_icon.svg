<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <defs>
    <radialGradient id="space" cx="50%" cy="45%" r="75%">
      <stop offset="0%"   stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#020810"/>
    </radialGradient>
    <radialGradient id="surface" cx="38%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#c4b49a"/>
      <stop offset="45%"  stop-color="#8a7560"/>
      <stop offset="100%" stop-color="#3d3028"/>
    </radialGradient>
    <radialGradient id="terminator" cx="72%" cy="60%" r="55%">
      <stop offset="0%"   stop-color="#1a1008" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#1a1008" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="75%"  stop-color="#c0622a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#c0622a" stop-opacity="0.18"/>
    </radialGradient>
    <radialGradient id="specular" cx="32%" cy="28%" r="30%">
      <stop offset="0%"   stop-color="#e8dcc8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#e8dcc8" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="deimosClip">
      <path d="M 100 58 C 118 56,138 62,148 76 C 160 92,158 112,152 128 C 145 146,130 160,112 168 C 94 176,72 174,58 164 C 42 153,36 134,38 116 C 40 98,50 80,64 70 C 76 61,88 60,100 58 Z"/>
    </clipPath>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="4" stdDeviation="7" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <filter id="regolith">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" seed="7" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grey"/>
      <feBlend in="SourceGraphic" in2="grey" mode="multiply" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="peakGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fond spatial -->
  <rect width="200" height="240" rx="22" fill="url(#space)"/>

